name: PA3 Post-Apply Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Workspace to apply'
        default: 'aws-prod'

env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_CTO_WEBHOOK }}

jobs:
  get-outputs:
    runs-on: ubuntu-latest
    outputs:
      alb_dns: ${{ steps.out-aws.outputs.alb_dns }}
      ec2_ips: ${{ steps.out-aws.outputs.ec2_ips }}
      db_ip: ${{ steps.out-prx.outputs.db_ip }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

    - name: Get AWS outputs
      id: out-aws
      working-directory: ./environments/aws-prod
      run: |
        terraform init -input=false -no-color
        ALB=$(terraform output -raw alb_dns_name)
        EC2_IPS=$(terraform output -json web_instance_ips | python3 -c "import sys,json;print(json.load(sys.stdin)[0])")
        echo "alb_dns=$ALB" >> $GITHUB_OUTPUT
        echo "ec2_ips=$EC2_IPS" >> $GITHUB_OUTPUT
        echo "::notice:: ALB=$ALB EC2=$EC2_IPS"

    - name: Get Proxmox outputs  
      id: out-prx
      working-directory: ./environments/proxmox-prod
      run: |
        terraform init -input=false -no-color
        DB_IP=$(terraform output -raw db_vm_ip)
        echo "db_ip=$DB_IP" >> $GITHUB_OUTPUT
        echo "::notice:: DB=$DB_IP"

  deploy-ansible:
    needs: get-outputs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Update inventory
      env:
        EC2_IP1: ${{ needs.get-outputs.outputs.ec2_ips }}
        EC2_IP2: ${{ needs.get-outputs.outputs.ec2_ips }} 
        DB_IP: ${{ needs.get-outputs.outputs.db_ip }}
      run: |
        chmod +x scripts/update-inventory.sh
        ./scripts/update-inventory.sh "$EC2_IP1" "$EC2_IP2" "$DB_IP"

    - name: Deploy WireGuard
      uses: dawidd6/action-ansible-playbook@v2
      with:
        playbook: ansible/playbooks/setup-wireguard.yml
        inventory: ansible/inventory/hosts.yml
        options: |
          --extra-vars "ansible_ssh_private_key_file={{ github.workspace }}/.ssh/server_key"
        directory: .
      env:
        ANSIBLE_HOST_KEY_CHECKING: False
        ANSIBLE_PRIVATE_KEY_FILE: ${{ secrets.SSH_PRIVATE_KEY }}

  verify:
    needs: [get-outputs, deploy-ansible]
    runs-on: ubuntu-latest
    outputs:
      health_ok: ${{ steps.health.outputs.status }}
    steps:
    - name: Health check ALB
      id: health
      env:
        ALB_DNS: ${{ needs.get-outputs.outputs.alb_dns }}
      run: |
        sleep 30  # Đợi ALB ready
        HEALTH=$(curl -s -f -m 10 "http://${ALB_DNS}/health" || echo "FAILED")
        STATUS=1
        if [[ "$HEALTH" != "OK" ]]; then STATUS=0; fi
        echo "status=$STATUS" >> $GITHUB_OUTPUT
        echo "Health: $HEALTH"

  notify-success:
    needs: [verify]
    if: needs.verify.outputs.health_ok == '1'  # Fix: dùng single quote
    runs-on: ubuntu-latest
    steps:
    - name: Success Notification
      uses: slackapi/slack-github-action@v1.26.0
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CTO_WEBHOOK }}
      with:
        payload: |
          {
            "blocks": [
              {"type": "header", "text": {"type": "plain_text", "text": "✅ PA3 SUCCESS"}},
              {"type": "section", "text": {"type": "mrkdwn", "text": "*Hybrid Cloud LIVE!*\nALB: ${{ needs.get-outputs.outputs.alb_dns }}\nDB: ${{ needs.get-outputs.outputs.db_ip }}"}},
              {"type": "context", "elements": [{"type": "mrkdwn", "text": "*Run:* #${{ github.run_number }}"}]}
            ]
          }
